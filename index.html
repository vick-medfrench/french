<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Conjugation Practice</title>
    <style>
        :root {
            --primary: #0E4D92;
            --primary-hover: #4338CA;
            --bg: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --success: #10B981;
            --error: #EF4444;
            --border: #E5E7EB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-main);
        }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: var(--border);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background-color: #D1D5DB;
        }

        .btn-outline {
            background-color: transparent;
            border: 2px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .btn-outline:hover {
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        .btn-danger {
            background-color: #FEE2E2;
            color: var(--error);
        }
        
        .btn-danger:hover {
            background-color: #FECACA;
        }

        .toggle-group {
            margin-bottom: 2rem;
        }

        .tense-select {
            padding: 0.75rem 1rem;
            font-size: 1.1rem;
            font-weight: 500;
            border: 2px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg);
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            width: 100%;
            max-width: 250px;
            transition: border-color 0.2s;
        }

        .tense-select:focus {
            border-color: var(--primary);
        }

        .verb-display {
            font-size: 3rem;
            font-weight: 700;
            margin: 1rem 0;
            color: var(--primary);
            letter-spacing: -0.05em;
        }

        .subject-display {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            color: var(--text-muted);
        }

        .subject-display strong {
            color: var(--text-main);
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem;
            font-size: 1.25rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            outline: none;
            transition: border-color 0.2s;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        #result-message {
            font-size: 1.2rem;
            font-weight: 600;
            min-height: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .correct { color: var(--success); }
        .incorrect { color: var(--error); }

        .setup-section {
            padding: 2rem;
            border: 2px dashed var(--border);
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 16px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .mistakes-list {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mistake-card {
            background: var(--bg);
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--error);
            text-align: left;
        }

        .mistake-card-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }
        
        .mistake-tense {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: normal;
        }

        .mistake-details {
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Conjugation Practice</h1>
        <button class="btn btn-outline" onclick="openMistakesWindow()">View Mistakes</button>
    </header>

    <div class="card">
        <div id="setup-section" class="setup-section" style="display: none;">
            <p style="margin-bottom: 1rem; color: var(--text-muted);">Could not auto-load vocabulary. Please upload <strong>conjugaison.csv</strong> manually.</p>
            <input type="file" id="file-input" accept=".csv">
        </div>

        <div id="loading-message" style="color: var(--text-muted);">Loading vocabulary...</div>

        <div id="quiz-section" style="display: none;">
            <div class="toggle-group" id="toggles">
                <select id="tense-select" onchange="nextQuestion()" class="tense-select">
                    <option value="present">Présent</option>
                    <option value="pc">Passé Composé</option>
                    <option value="futur">Futur Simple</option>
                    <option value="conditionnel">Conditionnel</option>
                </select>
            </div>

            <div class="verb-display" id="verb-text">Verb</div>
            <div class="subject-display" id="subject-text">Subject: </div>
            
            <input type="text" id="answer-input" placeholder="e.g., je suis, j'ai été" autocomplete="off">
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="checkAnswer()">Submit</button>
                <button class="btn btn-secondary" onclick="nextQuestion()">Skip</button>
            </div>

            <div id="result-message"></div>
        </div>
    </div>

    <div class="modal-overlay" id="mistakes-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Mistakes Log</h2>
                <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem;" onclick="closeMistakesWindow()">Close</button>
            </div>
            
            <div class="mistakes-list" id="mistakes-list">
                </div>

            <div style="text-align: right;">
                <button class="btn btn-danger" onclick="clearMistakes()">Clear Memory</button>
            </div>
        </div>
    </div>

    <script>
        let vocabulary = [];
        let currentItem = null;
        let mistakesLog = JSON.parse(localStorage.getItem('conjugationMistakes')) || [];

        window.onload = async function() {
            try {
                const response = await fetch('conjugaison.csv');
                if (response.ok) {
                    const text = await response.text();
                    processCSV(text);
                } else {
                    showManualUpload();
                }
            } catch (e) {
                showManualUpload();
            }
        };

        function showManualUpload() {
            document.getElementById('loading-message').style.display = 'none';
            document.getElementById('setup-section').style.display = 'block';
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                processCSV(event.target.result);
            };
            reader.readAsText(file);
        });

        function processCSV(csvText) {
            const lines = csvText.replace(/\r/g, '').split('\n');
            vocabulary = [];
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const parts = line.split(',');
                if (parts.length >= 6) {
                    vocabulary.push({
                        verb: parts[0].trim(),
                        pronom: parts[1].trim(),
                        present: parts[2].trim(),
                        conditionnel: parts[3].trim(),
                        pc: parts[4].trim(),
                        futur: parts[5].trim()
                    });
                }
            }

            if (vocabulary.length > 0) {
                document.getElementById('setup-section').style.display = 'none';
                document.getElementById('loading-message').style.display = 'none';
                document.getElementById('quiz-section').style.display = 'block';
                nextQuestion();
            } else {
                alert("File is empty or formatted incorrectly.");
            }
        }

        function nextQuestion() {
            if (vocabulary.length === 0) return;

            const tenseInput = document.getElementById('tense-select');
            const selectedTense = tenseInput.value;
            
            let attempts = 0;
            let targetVerbForm = "";

            while (attempts < 1000) {
                const randomIndex = Math.floor(Math.random() * vocabulary.length);
                currentItem = vocabulary[randomIndex];
                
                if (selectedTense === 'present') { targetVerbForm = currentItem.present; }
                else if (selectedTense === 'conditionnel') { targetVerbForm = currentItem.conditionnel; }
                else if (selectedTense === 'pc') { targetVerbForm = currentItem.pc; }
                else if (selectedTense === 'futur') { targetVerbForm = currentItem.futur; }

                if (targetVerbForm && targetVerbForm.trim() !== '-' && targetVerbForm.trim() !== '') {
                    break;
                }
                attempts++;
            }

            document.getElementById('verb-text').innerText = currentItem.verb;
            document.getElementById('subject-text').innerHTML = `Subject: <strong>${currentItem.pronom}</strong>`;
            document.getElementById('answer-input').value = '';
            document.getElementById('result-message').innerText = '';
            document.getElementById('result-message').className = '';
            document.getElementById('answer-input').focus();
        }

        // Advanced parser to expand (e) and (s) suffixes appropriately
        function parseAnswers(pronom, verbForm) {
            // Standardize CSV formats like allé(e)s to allé(e)(s) for easier replacement
            let str = verbForm.trim().toLowerCase();
            str = str.replace(/\(e\)s/g, '(e)(s)'); 
            
            // Generate the 4 combinations: Masc Sing, Fem Sing, Masc Plur, Fem Plur
            let ms = str.replace(/\(e\)/g, '').replace(/\(s\)/g, '').replace(/\s+/g, ' ').trim();
            let fs = str.replace(/\(e\)/g, 'e').replace(/\(s\)/g, '').replace(/\s+/g, ' ').trim();
            let mp = str.replace(/\(e\)/g, '').replace(/\(s\)/g, 's').replace(/\s+/g, ' ').trim();
            let fp = str.replace(/\(e\)/g, 'e').replace(/\(s\)/g, 's').replace(/\s+/g, ' ').trim();

            const p = pronom.trim().toLowerCase();
            let answers = [];

            function addAnswers(pronounStr, formsArray) {
                formsArray.forEach(form => {
                    if (!form) return;
                    if (pronounStr === 'je') {
                        const vowels = ['a', 'e', 'i', 'o', 'u', 'y', 'é', 'è', 'ê', 'h'];
                        if (vowels.includes(form[0])) {
                            answers.push("j'" + form);
                            answers.push("j' " + form);
                        } else {
                            answers.push("je " + form);
                        }
                    } else {
                        answers.push(pronounStr + " " + form);
                    }
                });
            }

            // Assign combinations based on strict user rules
            if (p === 'je' || p === 'tu') {
                addAnswers(p, [ms, fs]);
            } 
            else if (p === 'il/elle') {
                addAnswers('il', [ms]);
                addAnswers('elle', [fs]);
                addAnswers('il/elle', [ms, fs]); 
            } 
            else if (p === 'nous' || p === 'vous') {
                addAnswers(p, [ms, fs, mp, fp]);
            } 
            else if (p === 'ils/elles') {
                addAnswers('ils', [mp]);
                addAnswers('elles', [fp]);
                addAnswers('ils/elles', [mp, fp]); 
            }
            else {
                addAnswers(p, [ms, fs, mp, fp]);
            }

            // Deduplicate valid arrays
            let validArray = [...new Set(answers)];

            // Create a smart display string to teach the user exactly what was expected
            let displayStr = "";
            if (p === 'il/elle') {
                displayStr = ms === fs ? `il/elle ${ms}` : `il ${ms} / elle ${fs}`;
            } else if (p === 'ils/elles') {
                displayStr = mp === fp ? `ils/elles ${mp}` : `ils ${mp} / elles ${fp}`;
            } else if (p === 'je') {
                const vowels = ['a', 'e', 'i', 'o', 'u', 'y', 'é', 'è', 'ê', 'h'];
                let je_ms = vowels.includes(ms[0]) ? `j'${ms}` : `je ${ms}`;
                let je_fs = vowels.includes(fs[0]) ? `j'${fs}` : `je ${fs}`;
                displayStr = ms === fs ? je_ms : `${je_ms} (or ${je_fs})`;
            } else if (p === 'nous' || p === 'vous') {
                displayStr = ms === mp ? `${p} ${mp}` : `${p} ${mp} (also accepted: ${fp}, ${ms}, ${fs})`;
            } else {
                displayStr = validArray[0];
            }

            return {
                validList: validArray,
                display: displayStr
            };
        }

        function checkAnswer() {
            if (!currentItem) return;

            const tenseInput = document.getElementById('tense-select');
            const selectedTense = tenseInput.value;
            
            let tenseName = "";
            let targetVerbForm = "";

            if (selectedTense === 'present') { tenseName = "Présent"; targetVerbForm = currentItem.present; }
            else if (selectedTense === 'conditionnel') { tenseName = "Conditionnel"; targetVerbForm = currentItem.conditionnel; }
            else if (selectedTense === 'pc') { tenseName = "Passé Composé"; targetVerbForm = currentItem.pc; }
            else if (selectedTense === 'futur') { tenseName = "Futur Simple"; targetVerbForm = currentItem.futur; }
            
            // Build the accepted strings intelligently mapping constraints
            const parsedData = parseAnswers(currentItem.pronom, targetVerbForm);
            const validAnswers = parsedData.validList;
            const primaryDisplayAnswer = parsedData.display;
            
            // Handle curly apostrophes from mobile keyboards and extra spacing
            const userAnswerRaw = document.getElementById('answer-input').value;
            const userAnswerNormalized = userAnswerRaw.trim().replace(/’/g, "'").replace(/\s+/g, ' ').toLowerCase();

            const resultDiv = document.getElementById('result-message');

            if (validAnswers.includes(userAnswerNormalized)) {
                resultDiv.innerText = "Correct!";
                resultDiv.className = "correct";
                setTimeout(nextQuestion, 1200); 
            } else {
                resultDiv.innerHTML = `Incorrect. Answer: <strong>${primaryDisplayAnswer}</strong>`;
                resultDiv.className = "incorrect";
                
                logMistake(currentItem.verb, tenseName, primaryDisplayAnswer, userAnswerRaw || "(blank)");
            }
        }

        document.getElementById('answer-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkAnswer();
        });

        /* --- Mistakes Log Logic --- */

        function logMistake(verb, tense, correct, user) {
            mistakesLog.unshift({ verb, tense, correct, user });
            localStorage.setItem('conjugationMistakes', JSON.stringify(mistakesLog));
        }

        function openMistakesWindow() {
            renderMistakes();
            document.getElementById('mistakes-modal').style.display = 'flex';
        }

        function closeMistakesWindow() {
            document.getElementById('mistakes-modal').style.display = 'none';
        }

        function clearMistakes() {
            if(confirm("Are you sure you want to clear your mistakes history?")) {
                mistakesLog = [];
                localStorage.removeItem('conjugationMistakes');
                renderMistakes();
            }
        }

        function renderMistakes() {
            const listContainer = document.getElementById('mistakes-list');
            listContainer.innerHTML = '';

            if (mistakesLog.length === 0) {
                listContainer.innerHTML = '<p style="text-align:center; color: var(--text-muted); margin-top: 2rem;">No mistakes logged yet. Great job!</p>';
                return;
            }

            mistakesLog.forEach(mistake => {
                const card = document.createElement('div');
                card.className = 'mistake-card';
                card.innerHTML = `
                    <div class="mistake-card-title">
                        <span>${mistake.verb}</span>
                        <span class="mistake-tense">${mistake.tense}</span>
                    </div>
                    <div class="mistake-details">
                        <span style="color: var(--text-muted);">You wrote:</span> <span class="incorrect">${mistake.user}</span><br>
                        <span style="color: var(--text-muted);">Correct:</span> <strong class="correct">${mistake.correct}</strong>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
